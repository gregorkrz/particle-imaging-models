name: Test GPU

on:
  push:
    branches:
      - '**'
    # only spend GPU time when something that can change the suite's result
    # changed.
    paths:
      - 'pimm/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - '.github/scripts/modal_ci.py'
      - '.github/workflows/test-gpu.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: Reviewed commit SHA or ref to test (for fork commits)
        required: true
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: test-gpu-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  modal:
    # canonical repo only; secrets never reach fork code, and forks are covered
    # by an explicit maintainer workflow_dispatch of a reviewed ref.
    if: github.repository == 'DeepLearnPhysics/particle-imaging-models'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Modal
        run: python -m pip install modal==1.5.1

      - name: Run the suite on Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal run .github/scripts/modal_ci.py
