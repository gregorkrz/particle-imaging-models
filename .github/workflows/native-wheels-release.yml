name: Native wheel release

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Compatibility stack id from native-wheels.json
        required: true
        default: cu126-torch2.10-cp310
        type: string
      publish:
        description: Publish the staged wheel set as a public prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: native-wheel-draft-${{ inputs.stack }}
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.repository == 'DeepLearnPhysics/particle-imaging-models' &&
      inputs.publish == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select compatibility stack
        env:
          STACK: ${{ inputs.stack }}
        run: |
          config=".github/scripts/native-wheels.json"
          selected="$(jq -cer --arg id "$STACK" \
            '[.stacks[] | select(.id == $id)] | if length == 1 then .[0] else error("unknown stack") end' \
            "$config")"
          {
            echo "BUILD_IMAGE=$(jq -r .build_image <<< "$selected")"
            echo "CUDA_TAG=$(jq -r .cuda_tag <<< "$selected")"
            echo "PYTHON_TAG=$(jq -r .python_tag <<< "$selected")"
            echo "PYTHON_VERSION=$(jq -r .python <<< "$selected")"
            echo "TORCH_CUDA_ARCH_LIST=$(jq -r '.arches | join(" ")' <<< "$selected")"
            echo "TORCH_VERSION=$(jq -r .torch <<< "$selected")"
          } >> "$GITHUB_ENV"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h /

      - name: Build and verify wheels
        env:
          STACK: ${{ inputs.stack }}
        run: |
          mkdir wheelhouse
          docker pull "$BUILD_IMAGE"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env CUDA_HOME=/usr/local/cuda \
            --env CUDA_TAG \
            --env FORCE_CUDA=1 \
            --env GITHUB_SHA \
            --env HOME=/tmp \
            --env MAX_JOBS=2 \
            --env PYTHONHASHSEED=0 \
            --env PYTHON_TAG \
            --env PYTHON_VERSION \
            --env SOURCE_DATE_EPOCH=315532800 \
            --env STACK \
            --env TORCH_CUDA_ARCH_LIST \
            --env TORCH_VERSION \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            "$BUILD_IMAGE" \
            bash -euo pipefail -c '
              for toolset in /opt/rh/gcc-toolset-*/root/usr/bin; do
                PATH="$toolset:$PATH"; break
              done
              PYBIN="/opt/python/$PYTHON_TAG-$PYTHON_TAG/bin/python"
              "$PYBIN" --version
              "$PYBIN" -m venv /tmp/pimm-wheel-env
              /tmp/pimm-wheel-env/bin/python -m pip install \
                --no-cache-dir --no-compile --upgrade \
                pip==26.1.2 setuptools==83.0.0 wheel==0.47.0 \
                ninja==1.13.0 packaging==26.2
              /tmp/pimm-wheel-env/bin/python -m pip install \
                --no-cache-dir --no-compile \
                --index-url "https://download.pytorch.org/whl/$CUDA_TAG" \
                "torch==$TORCH_VERSION"
              /tmp/pimm-wheel-env/bin/python \
                .github/scripts/build_native_wheels.py
            '

      - name: Upload wheelhouse
        uses: actions/upload-artifact@v4
        with:
          name: native-wheels
          path: wheelhouse/
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: >-
      github.repository == 'DeepLearnPhysics/particle-imaging-models' &&
      inputs.publish == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4

      - name: Download wheelhouse
        uses: actions/download-artifact@v4
        with:
          name: native-wheels
          path: wheelhouse

      - name: Verify checksums
        run: cd wheelhouse && sha256sum --check SHA256SUMS

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          STACK: ${{ inputs.stack }}
        run: |
          test "$GITHUB_REPOSITORY" = "DeepLearnPhysics/particle-imaging-models"
          TAG="$(python -c 'import json; print(json.load(open("wheelhouse/native-wheels-manifest.json"))["release_tag"])')"
          draft="$(gh release view "$TAG" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [ "$draft" = false ]; then
            echo "refusing to replace published release $TAG" >&2
            exit 1
          fi
          if [ -z "$draft" ]; then
            gh release create "$TAG" \
              --draft \
              --target "$GITHUB_SHA" \
              --title "pimm native wheels: $STACK" \
              --notes "Prebuilt native wheels. This release remains a draft pending integration validation."
          else
            gh release edit "$TAG" \
              --draft \
              --target "$GITHUB_SHA" \
              --title "pimm native wheels: $STACK" \
              --notes "Prebuilt native wheels. This release remains a draft pending integration validation."
          fi
          gh release upload "$TAG" \
            wheelhouse/*.whl \
            wheelhouse/SHA256SUMS \
            wheelhouse/native-wheels-manifest.json \
            --clobber

  publish:
    if: >-
      github.repository == 'DeepLearnPhysics/particle-imaging-models' &&
      inputs.publish == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4

      - name: Select compatibility release
        env:
          STACK: ${{ inputs.stack }}
        run: |
          config=".github/scripts/native-wheels.json"
          selected="$(jq -cer --arg id "$STACK" \
            '[.stacks[] | select(.id == $id)] | if length == 1 then .[0] else error("unknown stack") end' \
            "$config")"
          echo "TAG=$(jq -r .release_tag <<< "$selected")" >> "$GITHUB_ENV"

      - name: Download staged wheelhouse
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          draft="$(gh release view "$TAG" --json isDraft --jq .isDraft)"
          if [ "$draft" != true ]; then
            echo "release $TAG is not a draft" >&2
            exit 1
          fi
          mkdir wheelhouse
          gh release download "$TAG" --dir wheelhouse

      - name: Verify checksums
        run: cd wheelhouse && sha256sum --check SHA256SUMS

      - name: Verify lock matches release assets
        run: python .github/scripts/verify_native_wheel_lock.py wheelhouse/native-wheels-manifest.json

      - name: Publish compatibility prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$TAG" --draft=false --prerelease
