name: Native wheel draft release

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Compatibility stack id from native-wheels.json
        required: true
        default: cu124-torch2.5-cp310
        type: string

permissions:
  contents: read

concurrency:
  group: native-wheel-draft-${{ inputs.stack }}
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'DeepLearnPhysics/particle-imaging-models'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select compatibility stack
        env:
          STACK: ${{ inputs.stack }}
        run: |
          config=".github/scripts/native-wheels.json"
          selected="$(jq -cer --arg id "$STACK" \
            '[.stacks[] | select(.id == $id)] | if length == 1 then .[0] else error("unknown stack") end' \
            "$config")"
          {
            echo "BUILD_IMAGE=$(jq -r .build_image <<< "$selected")"
            echo "CUDA_TAG=$(jq -r .cuda_tag <<< "$selected")"
            echo "PYTHON_VERSION=$(jq -r .python <<< "$selected")"
            echo "TORCH_CUDA_ARCH_LIST=$(jq -r '.arches | join(" ")' <<< "$selected")"
            echo "TORCH_VERSION=$(jq -r .torch <<< "$selected")"
          } >> "$GITHUB_ENV"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h /

      - name: Build and verify wheels
        env:
          STACK: ${{ inputs.stack }}
        run: |
          mkdir wheelhouse
          cat > "$RUNNER_TEMP/build_native_wheels.py" <<'PY'
          import email
          import hashlib
          import json
          import os
          import re
          import subprocess
          import sys
          import zipfile
          from pathlib import Path

          root = Path("/workspace")
          out = root / "wheelhouse"
          config = json.loads((root / ".github/scripts/native-wheels.json").read_text())
          stack = next(item for item in config["stacks"] if item["id"] == os.environ["STACK"])
          python = f"{sys.version_info.major}.{sys.version_info.minor}"
          if python != stack["python"]:
              raise SystemExit(f"expected Python {stack['python']}, got {python}")
          import torch
          if torch.__version__ != stack["torch"] or torch.version.cuda != stack["cuda"]:
              raise SystemExit(f"unexpected torch stack: {torch.__version__}, CUDA {torch.version.cuda}")

          for package in stack["packages"]:
              source = (root / package["path"]).resolve()
              source.relative_to(root / "libs")
              subprocess.run([
                  sys.executable, "-m", "pip", "wheel", "--no-build-isolation",
                  "--no-deps", "--wheel-dir", out, source,
              ], check=True)

          wheels = sorted(out.glob("*.whl"))
          if len(wheels) != len(stack["packages"]):
              raise SystemExit(f"expected {len(stack['packages'])} wheels, found {len(wheels)}")
          canonical = lambda value: re.sub(r"[-_.]+", "-", value).lower()
          torch_minor = ".".join(stack["torch"].split("+", 1)[0].split(".")[:2])
          suffix = f"{stack['cuda_tag']}torch{torch_minor}"
          records = []
          for package in stack["packages"]:
              version = f"{package['base_version']}+{suffix}"
              tag = f"{stack['python_tag']}-{stack['python_tag']}-linux_x86_64"
              name = re.sub(r"[-_.]+", "_", package["distribution"])
              wheel = out / f"{name}-{version}-{tag}.whl"
              if not wheel.is_file():
                  raise SystemExit(f"missing expected wheel: {wheel.name}")
              with zipfile.ZipFile(wheel) as archive:
                  metadata_names = [n for n in archive.namelist() if n.endswith(".dist-info/METADATA")]
                  wheel_names = [n for n in archive.namelist() if n.endswith(".dist-info/WHEEL")]
                  if len(metadata_names) != 1 or len(wheel_names) != 1:
                      raise SystemExit(f"invalid metadata in {wheel.name}")
                  metadata = email.message_from_bytes(archive.read(metadata_names[0]))
                  wheel_metadata = email.message_from_bytes(archive.read(wheel_names[0]))
              if canonical(metadata["Name"]) != canonical(package["distribution"]):
                  raise SystemExit(f"unexpected distribution: {wheel.name}")
              if metadata["Version"] != version:
                  raise SystemExit(f"unexpected version: {wheel.name}")
              if tag not in wheel_metadata.get_all("Tag", []):
                  raise SystemExit(f"unexpected wheel tag: {wheel.name}")
              digest = hashlib.sha256(wheel.read_bytes()).hexdigest()
              records.append({
                  "filename": wheel.name,
                  "sha256": digest,
                  "distribution": package["distribution"],
                  "version": version,
                  "import_name": package["import_name"],
              })

          (out / "SHA256SUMS").write_text(
              "".join(f"{item['sha256']}  {item['filename']}\n" for item in records)
          )
          release = {
              "schema_version": 1,
              "repository": config["repository"],
              "release_tag": stack["release_tag"],
              "git_sha": os.environ.get("GITHUB_SHA", ""),
              "stack": {
                  key: stack[key]
                  for key in ("id", "python", "python_tag", "torch", "cuda", "arches")
              },
              "wheels": records,
          }
          (out / "native-wheels-manifest.json").write_text(
              json.dumps(release, indent=2) + "\n"
          )
          PY

          docker pull "$BUILD_IMAGE"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env CONDA_PKGS_DIRS=/tmp/conda-pkgs \
            --env CONDA_PLUGINS_AUTO_ACCEPT_TOS=yes \
            --env CUDA_HOME=/usr/local/cuda \
            --env CUDA_TAG \
            --env FORCE_CUDA=1 \
            --env GITHUB_SHA \
            --env HOME=/tmp \
            --env MAX_JOBS=2 \
            --env PYTHON_VERSION \
            --env STACK \
            --env TORCH_CUDA_ARCH_LIST \
            --env TORCH_VERSION \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --volume "$RUNNER_TEMP/build_native_wheels.py:/build_native_wheels.py:ro" \
            --workdir /workspace \
            "$BUILD_IMAGE" \
            bash -euo pipefail -c '
              conda create --yes --prefix /tmp/pimm-wheel-env \
                "python=$PYTHON_VERSION" pip setuptools wheel ninja
              /tmp/pimm-wheel-env/bin/python -m pip install --no-cache-dir \
                --index-url "https://download.pytorch.org/whl/$CUDA_TAG" \
                "torch==$TORCH_VERSION"
              /tmp/pimm-wheel-env/bin/python /build_native_wheels.py
            '

      - name: Upload wheelhouse
        uses: actions/upload-artifact@v4
        with:
          name: native-wheels
          path: wheelhouse/
          if-no-files-found: error
          retention-days: 14

  draft-release:
    needs: build
    if: >-
      github.repository == 'DeepLearnPhysics/particle-imaging-models' &&
      github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheelhouse
        uses: actions/download-artifact@v4
        with:
          name: native-wheels
          path: wheelhouse

      - name: Verify checksums
        run: cd wheelhouse && sha256sum --check SHA256SUMS

      - name: Create or update draft release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          STACK: ${{ inputs.stack }}
        run: |
          test "$GITHUB_REPOSITORY" = "DeepLearnPhysics/particle-imaging-models"
          test "$GITHUB_REF_NAME" = "$DEFAULT_BRANCH"
          TAG="$(python -c 'import json; print(json.load(open("wheelhouse/native-wheels-manifest.json"))["release_tag"])')"
          draft="$(gh release view "$TAG" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [ "$draft" = false ]; then
            echo "refusing to replace published release $TAG" >&2
            exit 1
          fi
          if [ -z "$draft" ]; then
            gh release create "$TAG" \
              --draft \
              --target "$GITHUB_SHA" \
              --title "pimm native wheels: $STACK" \
              --notes "Prebuilt native wheels. This release remains a draft pending integration validation."
          else
            gh release edit "$TAG" \
              --draft \
              --target "$GITHUB_SHA" \
              --title "pimm native wheels: $STACK" \
              --notes "Prebuilt native wheels. This release remains a draft pending integration validation."
          fi
          gh release upload "$TAG" \
            wheelhouse/*.whl \
            wheelhouse/SHA256SUMS \
            wheelhouse/native-wheels-manifest.json \
            --clobber
