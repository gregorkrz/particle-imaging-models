name: Docker

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/docker/**'
      - '.python-version'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to build
        required: true
        default: main
        type: string
      tag:
        description: Raw image tag
        required: true
        default: main
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  lock:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.plan.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Verify dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          BUILD_REF: ${{ inputs.ref }}
          IMAGE_TAG: ${{ inputs.tag }}
        run: |
          if [ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]; then
            echo "dispatch the workflow itself at $BUILD_REF" >&2
            exit 1
          fi
          case "$BUILD_REF" in
            pimm-wheels-*)
              echo "native wheel refs are not application image refs" >&2
              exit 1
              ;;
          esac
          if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "invalid Docker image tag: $IMAGE_TAG" >&2
            exit 1
          fi
      - name: Plan build
        id: plan
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          echo "build=true" >> "$GITHUB_OUTPUT"
          if [ "$GITHUB_EVENT_NAME" != "push" ] || [ "$GITHUB_REF" != "refs/heads/main" ]; then
            exit 0
          fi
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            exit 0
          fi
          old="$(git show "$BEFORE_SHA:pyproject.toml" | python -c \
            'import sys, tomllib; print(tomllib.loads(sys.stdin.read())["project"]["version"])')"
          new="$(python -c \
            'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$old" != "$new" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "the release workflow will dispatch the versioned image build"
          fi
      - uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv lock --check

  build-standard:
    needs: lock
    if: needs.lock.outputs.build == 'true'
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      output: image
      file: .github/docker/Dockerfile
      push: ${{ github.repository == 'DeepLearnPhysics/particle-imaging-models' && github.event_name != 'pull_request' }}
      cache: true
      cache-mode: max
      cache-scope: standard
      meta-images: |
        youngsm/pimm
        ghcr.io/deeplearnphysics/pimm
      meta-tags: |
        type=ref,event=branch
        type=ref,event=pr
        type=semver,pattern={{version}},enable=${{ github.event_name == 'push' && github.ref_type == 'tag' }}
        type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'push' && github.ref_type == 'tag' }}
        type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
        type=raw,value=pytorch2.10.0-cuda12.6
      build-args: |
        TORCH_VERSION=2.10.0
        CUDA_VERSION=12.6
        CUDNN_VERSION=9
        TORCH_CUDA_ARCH_LIST=7.0 7.5 8.0 8.6 8.9 9.0
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        - registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
  test-standard:
    needs: build-standard
    if: github.repository == 'DeepLearnPhysics/particle-imaging-models'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    env:
      IMAGE: youngsm/pimm:pytorch2.10.0-cuda12.6
      TORCH_VERSION: 2.10.0
      TORCHVISION_VERSION: 0.25.0
      CUDA_VERSION: "12.6"
    steps:
      # the image ships only the environment; pimm code comes from the checkout
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
      - name: Validate imports, stack, and CLI
        run: |
          docker pull "$IMAGE"
          docker run --rm -i --env TORCH_VERSION --env TORCHVISION_VERSION \
            --env CUDA_VERSION \
            -v "$GITHUB_WORKSPACE:/work" -w /work "$IMAGE" python - <<'PY'
          import importlib
          import importlib.metadata
          import os

          modules = [
              "cnms",
              "pointgroup_ops",
              "pointops",
              "pointrope",
              "pytorch3d_ops",
              "serialize_cuda",
              "spconv",
              "torch",
              "torch_cluster",
              "torch_scatter",
              "torch_sparse",
              "torchvision",
              "pimm.models",
          ]
          for module in modules:
              importlib.import_module(module)
          import torch
          from torch.nn.attention.varlen import varlen_attn  # noqa: F401
          expected = os.environ["TORCH_VERSION"]
          if not torch.__version__.startswith(expected):
              raise SystemExit(f"expected torch {expected}, got {torch.__version__}")
          if torch.version.cuda != os.environ["CUDA_VERSION"]:
              raise SystemExit(f"expected CUDA {os.environ['CUDA_VERSION']}, got {torch.version.cuda}")
          torchvision_version = importlib.metadata.version("torchvision")
          if not torchvision_version.startswith(os.environ["TORCHVISION_VERSION"]):
              raise SystemExit(f"unexpected torchvision: {torchvision_version}")
          pyg_versions = {
              name: importlib.metadata.version(name)
              for name in ("torch-cluster", "torch-scatter", "torch-sparse")
          }
          expected_pyg = {
              "torch-cluster": "1.6.3",
              "torch-scatter": "2.1.2",
              "torch-sparse": "0.6.18",
          }
          if pyg_versions != expected_pyg:
              raise SystemExit(f"unexpected PyG compatibility wheels: {pyg_versions}")
          print("validated:", ", ".join(modules))
          PY
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work "$IMAGE" pimm --help
          # without a bound checkout the CLI must fail with a clear error
          if docker run --rm "$IMAGE" pimm --help 2>/dev/null; then
            echo "pimm unexpectedly worked without a checkout" >&2
            exit 1
          fi
      # the GPU job must test this exact build: tags are mutable rolling
      # aliases and Modal caches registry pulls by reference
      - name: Capture image digest
        id: digest
        run: echo "digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE")" >> "$GITHUB_OUTPUT"

  test-standard-gpu:
    needs: test-standard
    if: github.repository == 'DeepLearnPhysics/particle-imaging-models'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Modal
        run: python -m pip install modal==1.5.1

      - name: Run the suite on Modal inside the published image
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          PIMM_IMAGE: ${{ needs.test-standard.outputs.digest }}
        run: modal run .github/scripts/modal_ci.py

  build-nersc:
    needs: lock
    if: needs.lock.outputs.build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            youngsm/pimm-nersc
            ghcr.io/deeplearnphysics/pimm-nersc
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},enable=${{ github.event_name == 'push' && github.ref_type == 'tag' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'push' && github.ref_type == 'tag' }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=pytorch2.10.0-cuda12.6

      - name: Log in to GHCR
        if: github.repository == 'DeepLearnPhysics/particle-imaging-models'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.repository == 'DeepLearnPhysics/particle-imaging-models'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish NERSC image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/docker/Dockerfile.nersc
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TORCH_VERSION=2.10.0
            CUDA_VERSION=12.6
            CUDNN_VERSION=9
            TORCH_CUDA_ARCH_LIST=7.0 7.5 8.0 8.6 8.9 9.0
          cache-from: type=gha,scope=nersc
          cache-to: type=gha,scope=nersc,mode=max
          provenance: false
          sbom: false
          outputs: type=image,push=${{ github.repository == 'DeepLearnPhysics/particle-imaging-models' }},oci-mediatypes=false


  test-nersc:
    needs: build-nersc
    if: github.repository == 'DeepLearnPhysics/particle-imaging-models'
    runs-on: ubuntu-latest
    env:
      IMAGE: youngsm/pimm-nersc:pytorch2.10.0-cuda12.6
      TORCH_VERSION: 2.10.0
      TORCHVISION_VERSION: 0.25.0
      CUDA_VERSION: "12.6"
    steps:
      # the image ships only the environment; pimm code comes from the checkout
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
      - name: Validate imports, stack, MPI, and CLI
        run: |
          docker pull "$IMAGE"
          docker run --rm -i --env TORCH_VERSION --env TORCHVISION_VERSION \
            --env CUDA_VERSION \
            -v "$GITHUB_WORKSPACE:/work" -w /work "$IMAGE" python - <<'PY'
          import importlib
          import importlib.metadata
          import os

          modules = [
              "cnms",
              "pointgroup_ops",
              "pointops",
              "pointrope",
              "pytorch3d_ops",
              "serialize_cuda",
              "spconv",
              "torch",
              "torch_cluster",
              "torch_scatter",
              "torch_sparse",
              "torchvision",
              "pimm.models",
              "mpi4py",
          ]
          for module in modules:
              importlib.import_module(module)
          import h5py
          if not h5py.get_config().mpi:
              raise SystemExit("h5py was built without MPI support")
          import torch
          expected = os.environ["TORCH_VERSION"]
          if not torch.__version__.startswith(expected):
              raise SystemExit(f"expected torch {expected}, got {torch.__version__}")
          if torch.version.cuda != os.environ["CUDA_VERSION"]:
              raise SystemExit(f"expected CUDA {os.environ['CUDA_VERSION']}, got {torch.version.cuda}")
          torchvision_version = importlib.metadata.version("torchvision")
          if not torchvision_version.startswith(os.environ["TORCHVISION_VERSION"]):
              raise SystemExit(f"unexpected torchvision: {torchvision_version}")
          pyg_versions = {
              name: importlib.metadata.version(name)
              for name in ("torch-cluster", "torch-scatter", "torch-sparse")
          }
          expected_pyg = {
              "torch-cluster": "1.6.3",
              "torch-scatter": "2.1.2",
              "torch-sparse": "0.6.18",
          }
          if pyg_versions != expected_pyg:
              raise SystemExit(f"unexpected PyG compatibility wheels: {pyg_versions}")
          print("validated:", ", ".join(modules))
          PY
          docker run --rm -v "$GITHUB_WORKSPACE:/work" -w /work "$IMAGE" pimm --help
