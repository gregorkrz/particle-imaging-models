name: Docker

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/docker/**'
      - '.python-version'
      - 'libs/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv lock --check

  build-standard:
    needs: lock
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      file: .github/docker/Dockerfile
      push: ${{ github.event_name != 'pull_request' }}
      cache: true
      cache-mode: max
      cache-scope: standard
      meta-images: youngsm/pimm
      meta-tags: |
        type=ref,event=branch
        type=ref,event=pr
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=pytorch2.5.0-cuda12.4
      build-args: |
        TORCH_VERSION=2.5.0
        CUDA_VERSION=12.4
        CUDNN_VERSION=9
        TORCH_CUDA_ARCH_LIST=8.0 8.6 8.9 9.0
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      registry-auths: |
        - registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  build-nersc:
    needs: lock
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      file: .github/docker/Dockerfile.nersc
      push: ${{ github.event_name != 'pull_request' }}
      cache: true
      cache-mode: max
      cache-scope: nersc
      meta-images: youngsm/pimm-nersc
      meta-tags: |
        type=ref,event=branch
        type=ref,event=pr
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=pytorch2.5.0-cuda12.4
      build-args: |
        TORCH_VERSION=2.5.0
        CUDA_VERSION=12.4
        CUDNN_VERSION=9
        TORCH_CUDA_ARCH_LIST=8.0 8.6 8.9 9.0
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      registry-auths: |
        - registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
