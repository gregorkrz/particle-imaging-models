name: Backfill GHCR release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, including the v prefix
        required: true
        default: v0.3.1
        type: string

permissions:
  contents: read
  packages: write

jobs:
  copy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must have the form vX.Y.Z" >&2
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy standard image to GHCR
        env:
          TAG: ${{ inputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/deeplearnphysics/pimm:${TAG}" \
            "youngsm/pimm:${TAG}"

      - name: Copy NERSC image to GHCR
        env:
          TAG: ${{ inputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/deeplearnphysics/pimm-nersc:${TAG}" \
            "youngsm/pimm-nersc:${TAG}"

      - name: Verify GHCR manifests
        env:
          TAG: ${{ inputs.tag }}
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/deeplearnphysics/pimm:${TAG}"

          docker buildx imagetools inspect \
            "ghcr.io/deeplearnphysics/pimm-nersc:${TAG}"