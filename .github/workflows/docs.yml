# =============================================================================
# pimm documentation — build & publish
# =============================================================================
#
# Publishes the Sphinx docs to
#   https://deeplearnphysics.org/particle-imaging-models/stable/
#
# This mirrors how DeepLearnPhysics/doraemon_site deploys: NATIVE GitHub
# Pages-from-Actions (actions/upload-pages-artifact + actions/deploy-pages) on
# THIS repo's own `github-pages` environment. Because the org has a verified
# custom domain (deeplearnphysics.org / www, cert already issued), GitHub serves
# each project repo's Pages at  deeplearnphysics.org/<repo-name>/  — here that is
# /particle-imaging-models/.  No deploy keys, no writing into another repo, no
# CNAME in this workflow (the org owns the domain).
#
# Why a `stable/` subdirectory? Native Pages serves ONE artifact at the repo
# root (/particle-imaging-models/), and each deploy REPLACES the whole site. We
# build into  _site/stable/  and drop a root redirect, so the canonical URL is
# /particle-imaging-models/stable/ (matching conf.py `html_baseurl`). Adding
# /latest/ + per-version slots later means merging previous content into the
# single artifact — see docs/DEPLOYMENT.md.
#
# Build-environment note: `make -C docs html` runs gen_api.py and sphinx-autodoc,
# both of which import the full training stack. Prebuilt native wheels let the
# locked uv environment install and run directly on the CPU runner, so the docs
# build no longer needs the CUDA image. The workflow is gated to the canonical
# public repo.
# =============================================================================

name: Docs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'docs/**'
      - 'pimm/**'
      - 'uv.lock'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least privilege for the native Pages deployment (same set doraemon_site uses).
permissions:
  contents: read
  pages: write
  id-token: write

# GitHub's recommended Pages concurrency: serialize, don't abort an in-flight
# deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # only the canonical public repo publishes, never the private working repo or forks
    if: github.repository == 'DeepLearnPhysics/particle-imaging-models'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # tags + history (autodoc/version niceties)

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize the locked docs environment
        run: uv sync --locked --group docs

      - name: Build the docs
        run: uv run --no-sync make -C docs html

      # Assemble the Pages artifact: site under /stable/, plus a root redirect so
      # /particle-imaging-models/ lands on /particle-imaging-models/stable/.
      - name: Assemble Pages site
        run: |
          mkdir -p _site/stable
          cp -r docs/build/html/. _site/stable/
          printf '<!doctype html>\n<meta http-equiv="refresh" content="0; url=stable/">\n<title>pimm docs</title>\n<a href="stable/">pimm documentation</a>\n' > _site/index.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.repository == 'DeepLearnPhysics/particle-imaging-models'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
