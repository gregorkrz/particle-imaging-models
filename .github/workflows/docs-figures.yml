name: Docs figures

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or ref whose tutorial sources should run
        required: true
        default: main
        type: string
      models:
        description: Tutorial family to regenerate
        required: true
        default: all
        type: choice
        options:
          - all
          - panda
          - polarmae

permissions:
  contents: read

concurrency:
  group: docs-figures-${{ inputs.ref }}-${{ inputs.models }}
  cancel-in-progress: true

jobs:
  generate:
    if: github.repository == 'DeepLearnPhysics/particle-imaging-models'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reviewed source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Modal client
        run: python -m pip install modal==1.5.1

      - name: Generate figures on an L4 GPU
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: >-
          modal run .github/scripts/modal_docs_figures.py
          --models "${{ inputs.models }}"

      - name: Validate the generated bundle
        run: |
          test -f docs/source/_static/tutorials/plotly.min.js
          test -f docs/source/_static/tutorials/polarmae-metadata.json || test "${{ inputs.models }}" = panda
          test -f docs/source/_static/tutorials/panda-event-metadata.json || test "${{ inputs.models }}" = polarmae
          git status --short docs/source/_static/tutorials

      - name: Upload figure candidates for review
        uses: actions/upload-artifact@v4
        with:
          name: pimm-doc-figures-${{ inputs.models }}
          path: docs/source/_static/tutorials/
          if-no-files-found: error
          retention-days: 14
