[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pimm"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "PyYAML",
    "submitit",
    "tyro",
    "addict",
    "yapf",
] # NOTE: just for CLI job sumbmission. you need either environment.yml or the supplied dockerfile to do any training

[project.scripts]
pimm = "pimm.cli.main:main"

[tool.setuptools.packages.find]
include = ["pimm*"]
