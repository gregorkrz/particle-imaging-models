resources:
  scheduler: local
  nnodes: 1
  nproc_per_node: 4
  cpus_per_proc: 12
  time: "24:00:00"
  output: "slurm_logs/slurm-%j.out"  # keep srun logs out of the repo root (also the schema default)
  gpu_directive: gres

run:
  timestamp: true
  wandb_name: null

train:
  resume: false
  code_copy: true
  options: {}

container:
  repo_mount: /opt/pimm/src
