_base_: slurm.yaml

site: s3df

# Optional entries are left commented so this profile keeps its current
# behavior. Uncomment and customize only the settings this site needs.
# interactive: true # `pimm submit` uses a blocking salloc instead of sbatch

# Inherited from slurm.yaml; overridden here to keep experiment output off the
# repo/home filesystem and on the neutrino data volume.
paths:
  repo_root: .
  exp_root: /sdf/data/neutrino/gregork/pimm_exp

resources:
  scheduler: slurm
  # nnodes: 1
  nproc_per_node: 1 # 1 gpu
  # cpus_per_proc: 12
  account: mli:nu-ml-dev
  partition: ampere
  # qos: regular
  # constraint: gpu
  # dependency: "afterok:12345"
  # time: "24:00:00"
  mem: 64G  # peak host RSS observed ~4 GB; 64G still leaves generous headroom for dataloaders
  # output: "slurm_logs/slurm-%j.out"
  # error: "slurm_logs/slurm-%j.err"
  # gpu_directive: gres # or gpus-per-node
  # job_name: pimm
  # signal_delay_s: 120
  # scheduler_options:
  #   exclusive: true

# bare metal: jobs use the checkout's uv-managed .venv directly
container:
  runtime: none
  # image: /path/to/image.sif
  # module: gpu
  # binds:
  #   - /path/visible/in/the/container
  # repo_mount: /opt/pimm/src
  # unset_env:
  #   - LD_LIBRARY_PATH
  # interpreter: /opt/pimm/.venv/bin/python

# Submit from another login host and/or relocate submitit's metadata.
# submit:
#   host: iana
#   folder: slurm_logs/submitit

# setup:
#   - module load cuda

train:
  python: .venv/bin/python

env:  # put secrets in .env, not here!
  NCCL_SOCKET_IFNAME: "^docker0,lo"
  PIMM_HF_CACHE: /sdf/data/neutrino/gregork/hf_cache
  # EXTRA_VARIABLE: "value"

# Optional rendezvous values override the automatically generated defaults.
# rdzv:
#   endpoint: host.example:29500
#   id: pimm-run
#   backend: c10d

# Used only for chained interactive jobs supervised through scron.
# watchdog:
#   qos: cron
#   interval_min: 5
#   time: "1-00:00:00"

