_base_: slurm.yaml

site: s3df

resources:
  nproc_per_node: 1 # 1 gpu
  mem: 512G

slurm:
  account: mli:nu-ml-dev
  partition: ampere

container:
  runtime: singularity
  image: /sdf/data/neutrino/youngsam/images/pimm_pytorch2.5.0-cuda12.4.sif
  binds:
    - /sdf
    - /fs
    - /sdf/scratch
    - /lscratch
  interpreter: /opt/pimm/.venv/bin/python

env:
  NCCL_SOCKET_IFNAME: "^docker0,lo"
  REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
