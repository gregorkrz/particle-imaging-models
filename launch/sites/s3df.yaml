_base_: slurm.yaml

site: s3df

resources:
  nproc_per_node: 1 # 1 gpu
  mem: 512G

slurm:
  account: mli:nu-ml-dev
  partition: ampere

# bare metal: jobs use the checkout's uv-managed .venv directly
container:
  runtime: none

train:
  python: .venv/bin/python

env:
  NCCL_SOCKET_IFNAME: "^docker0,lo"
  PIMM_HF_CACHE: /sdf/data/neutrino/gregork/hf_cache
