_base_: slurm.yaml

site: nersc-container

# Optional entries are left commented so this profile keeps its current
# behavior. Uncomment and customize only the settings this site needs.
# interactive: true # `pimm submit` uses a blocking salloc instead of sbatch

# Inherited from slurm.yaml; uncomment to override for this site.
# paths:
#   repo_root: .
#   exp_root: "{repo_root}/exp"

resources:
  # Scheduler-only settings are ignored by `pimm launch`.
  scheduler: slurm
  # nnodes: 1
  # nproc_per_node: 4
  cpus_per_proc: 6
  account: m5238_g
  # partition: gpu
  qos: regular
  constraint: gpu
  # dependency: "afterok:12345"
  # time: "24:00:00"
  gpu_directive: gpus-per-node
  mem: 192G
  # output: "slurm_logs/slurm-%j.out"
  # error: "slurm_logs/slurm-%j.err"
  # job_name: pimm
  # signal_delay_s: 120
  # scheduler_options:
  #   exclusive: true

# containerized alternative to the bare-metal nersc site: the frozen image
# environment, for large-scale or pinned-artifact runs
container:
  runtime: shifter
  image: ghcr.io/deeplearnphysics/pimm-nersc:v0.5.0
  module: gpu,nccl-plugin
  # binds:
  #   - /path/visible/in/the/container
  # repo_mount: /opt/pimm/src
  interpreter: /opt/pimm/.venv/bin/python
  unset_env:
    - LD_LIBRARY_PATH
    - LD_PRELOAD

# Submit from another login host and/or relocate submitit's metadata.
# submit:
#   host: login.cluster.example
#   folder: slurm_logs/submitit

setup:
  - export LD_LIBRARY_PATH=/opt/hdf5/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
  # - module load another-module

env:  # put secrets in .env, not here!
  # Perlmutter compute nodes reach huggingface.co but the
  # Xet CAS transfer endpoint (cas-bridge.xethub.hf.co) stalls.
  # So we force the classic LFS/HTTPS path via cdn-lfs.
  HF_HUB_DISABLE_XET: "1"
  NCCL_SOCKET_IFNAME: "^docker0,lo"
  NCCL_NET_GDR_LEVEL: PHB
  HDF5_USE_FILE_LOCKING: "FALSE"
  # EXTRA_VARIABLE: "value"

# Optional rendezvous values override the automatically generated defaults.
# rdzv:
#   endpoint: host.example:29500
#   id: pimm-run
#   backend: c10d

# Used only for chained interactive jobs supervised through scron.
# watchdog:
#   qos: cron
#   interval_min: 5
#   time: "1-00:00:00"

# Per-run defaults are valid here, but reusable run choices usually belong in
# launch/runs/*.yaml so the site profile remains portable.
